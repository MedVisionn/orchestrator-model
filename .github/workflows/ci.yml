name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"

jobs:
  # =============================================================================
  # Code Quality Checks
  # =============================================================================
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        working-directory: ./services/xray-ai-service
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 mypy
          pip install -r requirements.txt || echo "Requirements install failed, continuing..."
      
      - name: Run Black (check only)
        working-directory: ./services/xray-ai-service
        run: |
          black --check src/ tests/ || echo "Black formatting issues found"
        continue-on-error: true
      
      - name: Run isort (check only)
        working-directory: ./services/xray-ai-service
        run: |
          isort --check-only src/ tests/ || echo "Import sorting issues found"
        continue-on-error: true
      
      - name: Run flake8
        working-directory: ./services/xray-ai-service
        run: |
          flake8 src/ tests/ --max-line-length=100 --extend-ignore=E203,W503,E501 || echo "Flake8 issues found"
        continue-on-error: true

  # =============================================================================
  # Security Scanning
  # =============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './services/xray-ai-service'
          format: 'table'
        continue-on-error: true
      
      - name: Run Bandit security scanner
        run: |
          pip install bandit
          bandit -r services/xray-ai-service/src/ || echo "Security issues found"
        continue-on-error: true

  # =============================================================================
  # Basic Tests
  # =============================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: medscan_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        working-directory: ./services/xray-ai-service
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov pytest-mock
          pip install -r requirements.txt || echo "Some dependencies may have failed"
      
      - name: Run syntax check
        working-directory: ./services/xray-ai-service
        run: |
          python -m py_compile src/**/*.py || echo "Syntax check completed with warnings"
        continue-on-error: true
      
      - name: Run unit tests
        working-directory: ./services/xray-ai-service
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/medscan_test
          REDIS_URL: redis://localhost:6379/1
          PYTHONPATH: .
        run: |
          pytest tests/unit/ -v || echo "Tests completed with some failures"
        continue-on-error: true

  # =============================================================================
  # Build Docker Image
  # =============================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./services/xray-ai-service
          file: ./services/xray-ai-service/Dockerfile
          push: false
          tags: xray-ai-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

  # =============================================================================
  # Documentation Check
  # =============================================================================
  docs:
    name: Check Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check documentation files
        run: |
          echo "Checking documentation structure..."
          test -f README.md && echo "✓ README.md found"
          test -f ARCHITECTURE_SUMMARY.md && echo "✓ ARCHITECTURE_SUMMARY.md found"
          test -f IMPLEMENTATION_STATUS.md && echo "✓ IMPLEMENTATION_STATUS.md found"
          test -f services/xray-ai-service/README.md && echo "✓ Service README.md found"
          echo "Documentation check passed!"
