apiVersion: v1
kind: ConfigMap
metadata:
  name: xray-service-config
  namespace: medscan
  labels:
    app: xray-ai-service
    component: config
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  
  # Model Configuration
  MODEL_NAME: "densenet121-res224-all"
  MODEL_VERSION: "1.0.0"
  DEVICE: "cpu"
  
  # Inference Configuration
  INPUT_SIZE_H: "224"
  INPUT_SIZE_W: "224"
  BATCH_SIZE: "1"
  INFERENCE_TIMEOUT: "30"
  MAX_FILE_SIZE_MB: "10"
  
  # Calibration
  CALIBRATION_METHOD: "temperature_scaling"
  TEMPERATURE: "1.5"
  
  # Cache
  ENABLE_CACHE: "true"
  CACHE_TTL: "3600"
  REDIS_MAX_CONNECTIONS: "50"
  
  # Database
  DATABASE_POOL_SIZE: "20"
  DATABASE_MAX_OVERFLOW: "10"
  
  # Monitoring
  ENABLE_PROMETHEUS: "true"
  METRICS_PORT: "9090"
  
  # Explainability
  ENABLE_GRADCAM: "true"
  GRADCAM_LAYER: "features.denseblock4"
  
  # Rate Limiting
  ENABLE_RATE_LIMIT: "true"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"
  
  # Feature Flags
  ENABLE_REPORT_GENERATION: "true"
  ENABLE_FEEDBACK: "true"
  LOG_PREDICTIONS: "true"
  
  # CORS
  CORS_ORIGINS: "https://medscanai.com,https://app.medscanai.com"
