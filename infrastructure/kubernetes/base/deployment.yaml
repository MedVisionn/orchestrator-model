apiVersion: apps/v1
kind: Deployment
metadata:
  name: xray-ai-service
  namespace: medscan
  labels:
    app: xray-ai-service
    version: v1
    component: inference
spec:
  replicas: 3
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: xray-ai-service
      version: v1
  template:
    metadata:
      labels:
        app: xray-ai-service
        version: v1
        component: inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: xray-service-sa
      
      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      # Init containers
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
        
        - name: wait-for-redis
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z redis-service 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
      
      containers:
        - name: xray-service
          image: ghcr.io/medvisionn/xray-ai-service:1.0.0
          imagePullPolicy: IfNotPresent
          
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          
          envFrom:
            - configMapRef:
                name: xray-service-config
            - secretRef:
                name: xray-service-secrets
          
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          
          # Liveness probe
          livenessProbe:
            httpGet:
              path: /liveness
              port: http
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          
          # Readiness probe
          readinessProbe:
            httpGet:
              path: /readiness
              port: http
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          
          # Startup probe (for slow-starting containers)
          startupProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 30
          
          volumeMounts:
            - name: model-cache
              mountPath: /app/models
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/cache
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: xray-model-pvc
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir:
            sizeLimit: 1Gi
      
      # Affinity rules for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - xray-ai-service
                topologyKey: kubernetes.io/hostname
      
      # Tolerations (if using dedicated nodes)
      # tolerations:
      #   - key: "workload"
      #     operator: "Equal"
      #     value: "ml-inference"
      #     effect: "NoSchedule"
      
      # Node selector (if using dedicated nodes)
      # nodeSelector:
      #   workload: ml-inference

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: xray-service-sa
  namespace: medscan
  labels:
    app: xray-ai-service

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: xray-model-pvc
  namespace: medscan
  labels:
    app: xray-ai-service
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
