apiVersion: v1
kind: Secret
metadata:
  name: xray-service-secrets
  namespace: medscan
  labels:
    app: xray-ai-service
    component: secrets
type: Opaque
stringData:
  # Database credentials (use external secrets manager in production)
  DATABASE_URL: "postgresql://postgres:CHANGE_ME@postgres-service:5432/medscan"
  
  # Redis URL
  REDIS_URL: "redis://redis-service:6379/0"
  
  # MLflow
  MLFLOW_TRACKING_URI: "http://mlflow-service:5000"
  
  # Secret key (generate with: openssl rand -hex 32)
  SECRET_KEY: "CHANGE_ME_USE_SECRETS_MANAGER"
  
  # AWS credentials (if using S3)
  # AWS_ACCESS_KEY_ID: ""
  # AWS_SECRET_ACCESS_KEY: ""
  
  # Sentry DSN (if using)
  # SENTRY_DSN: ""

---
# Note: In production, use external secrets management:
# - AWS Secrets Manager + External Secrets Operator
# - HashiCorp Vault + Vault Agent Injector
# - Google Secret Manager
# - Azure Key Vault
