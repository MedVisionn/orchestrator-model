apiVersion: v1
kind: Service
metadata:
  name: xray-ai-service
  namespace: medscan
  labels:
    app: xray-ai-service
    component: inference
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  selector:
    app: xray-ai-service
    version: v1
  sessionAffinity: None

---
# Headless service for StatefulSet (if needed)
apiVersion: v1
kind: Service
metadata:
  name: xray-ai-service-headless
  namespace: medscan
  labels:
    app: xray-ai-service
spec:
  clusterIP: None
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app: xray-ai-service
